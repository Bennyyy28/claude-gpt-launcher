name: Bug report
description: Report a reproducible launcher, CLI, or MCP problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Claude GPT Launcher. Never include tokens, OAuth output, or private source code.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 1.0.0 or commit SHA
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 14.6
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use a non-sensitive test repository and redact account information.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, tokens, private code, and personal paths.
          required: true
